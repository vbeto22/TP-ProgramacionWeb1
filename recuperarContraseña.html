<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recupero contraseña</title>
    <link rel="stylesheet" href="styles/headerYFooter.css"> 
    <link rel="stylesheet" href="styles/recuperarContraseña.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <details class="carritoCompra">
                <summary class="carrito" >
                    <img class="ImgCarrito" src="imagenes/cart.svg" alt="Carrito de compras">
                </summary>
                <section class="resumenCompra">
                    <article class="tituloCompra">
                    <h2>Resumen de compra</h2>
                    </article>
                    <article class="items">
                        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                        <p>Cantidad: 1</p>
                    </article>
                    <article class="items">
                        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                        <p>Cantidad: 1</p>
                    </article>


                    <p>Total: $3500</p>
                    <form action="pago.html">
                        <button class="botonPago" type="submit">Pagar</button>
                    </form>
                </section>

            </details>

            <a class="usuario" href="usuario.html">Usuario</a>     
        </section>   
    </header>
    <main>
        <h2 class="titulo">Recupera tu contraseña en UNLaM-Land</h2>
        <form class="formulario" action="index.html" method="get">
            <label class="label"for="email">Correo electronico:</label>
            <input class="input" type="email" id="email" name="email" required placeholder="Ingrese su correo electrónico">
            <label class="label" for="contraseña">Contraseña nueva:</label>
            <input class="input" type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña nueva">
            <button class="boton" type="submit">Enviar</button>

        </form>
    </main>
    <footer>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>     
    
</body>
</html>
