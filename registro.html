<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="styles/headerFooterFormulario.css">
    <link rel="stylesheet" href="styles/registro.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <a class="login" href="index.html">Login</a>     
        </section>   
    </header>
    <main>
        <h2 class="titulo">Crear cuenta en UNLaM-Land</h2>
        <form class="formulario" action="index.html" method="get">
            <label class="label" for="nombre">Nombre:</label>
            <input class="input" type="text" id="nombre" name="nombre" required placeholder="Ingrese su nombre completo">
            <label class="label" for="apellido">Apellido:</label>
            <input class="input" type="text" id="apellido" name="apellido" required placeholder="Ingrese su apellido">
            <label class="label" for="email">Correo electrónico:</label>
            <input class="input" type="email" id="email" name="email" required placeholder="Ingrese su correo electrónico">
            <label class="label" for="usuario">Nombre de usuario:</label>
            <input class="input" type="text" id="usuario" name="usuario" required placeholder="Ingrese nombre de usuario">
            <label class="label" for="nacimiento">Fecha de nacimiento:</label>
            <input class="input" type="date" id="nacimiento" name="nacimiento" required>
            <label class="label" for="DNI">DNI:</label>
            <input class="input" type="number" id="DNI" name="DNI" required placeholder="Ingrese su DNI">
            <label class="label" for="telefono">Número de teléfono:</label>
            <input class="input" type="tel" id="telefono" name="telefono" required placeholder="Ingrese su número de teléfono">
            <label class="label" for="contraseña">Contraseña:</label>
            <input class="input" type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
            <button class="boton" type="submit">Crear cuenta</button>
            <button class="boton" type="reset">Limpiar campos</button>

        </form>
    </main>
    <footer>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>
    <script src="scripts/registro.js"></script>  
</body>
</html>
