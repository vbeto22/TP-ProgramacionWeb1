<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario</title>
    <link rel="stylesheet" href="styles/headerYFooter.css">
    <link rel="stylesheet" href="styles/usuario.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <details class="carritoCompra">
                <summary class="carrito" >
                    <img class="ImgCarrito" src="imagenes/cart.svg" alt="Carrito de compras">
                </summary>
                <section class="resumenCompra">
                    <article class="tituloCompra">
                    <h2>Resumen de compra</h2>
                    </article>
                    <article class="items">
                        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                        <p>Cantidad: 1</p>
                    </article>
                    <article class="items">
                        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                        <p>Cantidad: 1</p>
                    </article>


                    <p>Total: $3500</p>
                    <form action="pago.html">
                        <button class="botonPago" type="submit">Pagar</button>
                    </form>
                </section>

            </details>

            <a class="usuario" href="usuario.html">Usuario</a>     
        </section>   
    </header>
    <main>
        <form id="formularioUsuario" action="index.html" method="get">
            <section class="perfil">
                <img src="imagenes/usuario.svg" alt="Imagen de perfil">
                <h4 class="nombre-usuario" id="nombreUsuario">nombre de usuario</h4>
            </section>
            <section class="datosPerfil">
                <h2>Datos de la cuenta</h2>
                <h3 class="mail">Mail</h3>
                <p class="mail" id="email">mario@gmail.com</p>
                <br>
                <h3 class="contraseña">Contraseña</h3>
                <p class="contraseña">************</p>
                <br>
                <h3 class="nuevaContraseña">Nueva contraseña</h3>
                <input class="nuevaContraseña" type="password" name="nuevaContraseña" id="nuevaContraseña" placeholder="Ingrese su nueva contraseña">
                <h3 class="repetirContraseña">Repetir contraseña</h3>
                <input class="repetirContraseña" type="password" name="repiteContraseña" id="repiteContraseña" placeholder="Ingrese su nueva contraseña">
            </section>
            <section class="accionesFormulario">
                <article class="guardar">
                    <input class="boton" type="submit" value="Guardar cambios">
                </article>
            </section>
        </form>
    </main>   
    <footer>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>       
    
</body>
</html>
