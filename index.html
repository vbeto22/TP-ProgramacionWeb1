<!DOCTYPE html>

    <main>
        <h2>Iniciar sesion en UNLaM-Land</h2>
        <form action="mainLogueado.html" method="get">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
            <button type="submit">Iniciar sesion</button>
        </form>

        <a href="recuperarContraseña.html">¿Olvidaste tu contraseña?</a>

        <a href="registro.html">Crear cuenta nueva</a>
