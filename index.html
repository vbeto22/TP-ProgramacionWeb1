<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles/headerFooterFormulario.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <a class="login" href="index.html">Login</a>     
        </section>   
    </header>
    <main>
        <h2 class="titulo">Iniciar sesion en UNLaM-Land</h2>
        <form class="formulario"action="mainLogueado.html" method="get">
            <label class="label" for="usuario">Usuario:</label>
            <input class="input" type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
            <label class="label" for="contraseña">Contraseña:</label>
            <input class="input" type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
            <button class="boton" type="submit">Iniciar sesion</button>
        </form>

        <section class="opciones">
        <a class="olvidasteContraseña" href="recuperarContraseña.html">¿Olvidaste tu contraseña?</a>

        <a class="registro" href="registro.html">Crear cuenta nueva</a>
        </section>

    </main>   
    <footer>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>
    <script src="scripts/index.js"></script>  
</body>
</html>
