<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>
    <link rel="stylesheet" href="styles/headerYFooter.css">
    <link rel="stylesheet" href="styles/pago.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <details class="carritoCompra">
                <summary class="carrito" >
                    <img class="ImgCarrito" src="imagenes/cart.svg" alt="Carrito de compras">
                </summary>
                <section class="resumenCompra">
                    <article class="tituloCompra">
                    <h2>Resumen de compra</h2>
                    </article>
                    <article class="items">
                        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                        <p>Cantidad: 1</p>
                    </article>
                    <article class="items">
                        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                        <p>Cantidad: 1</p>
                    </article>


                    <p>Total: $3500</p>
                    <form action="pago.html">
                        <button class="botonPago" type="submit">Pagar</button>
                    </form>
                </section>

            </details>

            <a class="usuario" href="usuario.html">Usuario</a>     
        </section>   
    </header>
    <main>
        <h2>Mi carrito</h2>

        <h3>Productos</h3>
        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
        <p>Entrada de lunes a viernes: $1000</p>
        <p>Cantidad: 1</p>
        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
        <p>Pase Rápido: $2500</p>
        <p>Cantidad: 1</p>

        <h3>Total a pagar: $3500</h3>
        <form action="index.html" method="get">

            <input type="radio" id="mercadoPago" name="metodoPago" value="mercadoPago" required>
            <label for="mercadoPago">Mercado Pago</label><br>
            <img src="imagenes/mercadoPago.svg">

            <input type="radio" id="tarjetaCredito" name="metodoPago" value="tarjetaCredito">
            <label for="tarjetaCredito">Tarjeta de crédito</label><br>
            <img src="imagenes/americanExpressCredito.svg">
            <img src="imagenes/visaCredito.svg">
            <img src="imagenes/mastercardCredito.svg">
            
            <label for="tarjetaDebito">Tarjeta de débito</label><br>
            <input type="radio" id="tarjetaDebito" name="metodoPago" value="tarjetaDebito">
            <img src="imagenes/masterCardDebito.svg">
            <img src="imagenes/visaDebito.svg">

            <input type="radio" id="efectivo" name="metodoPago" value="efectivo">
            <label for="efectivo">Efectivo</label><br>
            <img src="imagenes/pagoFacil.svg">
            <img src="imagenes/rapipago.svg"> 

            <button type="submit">Pagar</button>
        </form>
    </main>
    <footer>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>       

</body>
</html>
