<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago</title>
    <link rel="stylesheet" href="styles/headerYFooter.css">
    <link rel="stylesheet" href="styles/pago.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="navegacion">
            <details class="carritoCompra">
                <summary class="carrito" >
                    <img class="ImgCarrito" src="imagenes/cart.svg" alt="Carrito de compras">
                </summary>
                <section class="resumenCompra">
                    <article class="tituloCompra">
                    <h2>Resumen de compra</h2>
                    </article>
                    <article class="items">
                        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                        <p>Cantidad: 1</p>
                    </article>
                    <article class="items">
                        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                        <p>Cantidad: 1</p>
                    </article>


                    <p>Total: $3500</p>
                    <form action="pago.html">
                        <button class="botonPago" type="submit">Pagar</button>
                    </form>
                </section>

            </details>

            <a class="usuario" href="usuario.html">Usuario</a>     
        </section>   
    </header>
    <main>
        <section class="productosSeleccionados">
            <h2 class="titulo">Mi carrito</h2>

            <section class="productos">
                <h3 class="subtitulo">Productos</h3>
                <article class="item-lista">
                    <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                    <p class="valor">Entrada de lunes a viernes: $1000</p>
                    <p class="cantidad">Cantidad: 1</p>
                </article>
                <article class="item-lista">
                    <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                    <p class="valor">Pase Rápido: $2500</p>
                    <p class="cantidad">Cantidad: 1</p>
                </article>
            </section>

            <section class="totalCompra">

                <h3 class="total">Total a pagar: $3500</h3>
            </section>

        </section>



        <form class="metodosPago" action="index.html" method="get">

            <h2 class="subtitulo">Seleccione su método de pago</h2>

            <div class="opcion-pago">
                <input type="radio" id="mercadoPago" name="metodoPago" value="mercadoPago" required>
                <label class="labelMetodo" for="mercadoPago">Mercado Pago</label>
                <div class="imagenes-metodo">
                    <img src="imagenes/mercadoPago.svg" alt="Mercado Pago">
                </div>
            </div>

            <div class="opcion-pago">
                <input type="radio" id="tarjetaCredito" name="metodoPago" value="tarjetaCredito">
                <label class="labelMetodo" for="tarjetaCredito">Tarjeta de crédito</label>
                <div class="imagenes-metodo">
                    <img src="imagenes/americanExpressCredito.svg" alt="American Express">
                    <img src="imagenes/visaCredito.svg" alt="Visa Crédito">
                    <img src="imagenes/mastercardCredito.svg" alt="Mastercard Crédito">
                </div>
            </div>
            
            <div class="opcion-pago">
                <input type="radio" id="tarjetaDebito" name="metodoPago" value="tarjetaDebito">
                <label class="labelMetodo" for="tarjetaDebito">Tarjeta de débito</label>
                <div class="imagenes-metodo">
                    <img src="imagenes/masterCardDebito.svg" alt="Mastercard Débito">
                    <img src="imagenes/visaDebito.svg" alt="Visa Débito">
                </div>
            </div>

            <div class="opcion-pago">
                <input type="radio" id="efectivo" name="metodoPago" value="efectivo">
                <label class="labelMetodo" for="efectivo">Efectivo</label>
                <div class="imagenes-metodo">
                    <img src="imagenes/pagoFacil.svg" alt="Pago Fácil">
                    <img src="imagenes/rapipago.svg" alt="Rapipago"> 
                </div>
            </div>

            <button class="boton" type="submit">Pagar</button>
        </form>
    </main>
    <footer>
        <section class="logo">
            <a  href="mainLogueado.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>       

</body>
</html>
