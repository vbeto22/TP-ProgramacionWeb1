<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNLaM-Land</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/headerYFooter.css">
</head>
<body>
    <header>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
            <input type="text" id="buscador" placeholder="Buscar entrada...">
        </section>
        <section class="navegacion">
            
            <details class="carritoCompra">
                <summary class="carrito" >
                    <img class="ImgCarrito" src="imagenes/cart.svg" alt="Carrito de compras">
                </summary>
                <section class="resumenCompra">
                    <article class="tituloCompra">
                    <h2>Resumen de compra</h2>
                    </article>
                    <article class="items">
                        <img src="imagenes/ticket1.svg" alt="Ticket Semanal">
                        <p>Cantidad: 1</p>
                    </article>
                    <article class="items">
                        <img src="imagenes/paseRapido.svg" alt="Pase Rápido">
                        <p>Cantidad: 1</p>
                    </article>


                    <p>Total: $3500</p>
                    <form action="pago.html">
                        <button class="botonPago" type="submit">Pagar</button>
                    </form>
                </section>

            </details>

            <a class="usuario" href="usuario.html">Usuario</a>     
        </section>   
    </header>
    <main>
        <section class="contenedorImagen">
            <img class="centrarImagen" src="imagenes/Atracion Hero.jpg">
            <p class="Slogan">Bienvenidos a UNLaM-Land, el parque de diversiones de la Universidad Nacional de La Matanza.</p>
        </section>
        <section class="contenedorAtracciones">
            <h2 class="subtitulo">Atracciones</h2>
                <img class="atraccion1" src="imagenes/Samba.jpg">
                <img class="atraccion2" src="imagenes/calesitaG.jpg">
                <img class="atraccion3" src="imagenes/montañaAcuatica.jpeg">
                <img class="atraccion4" src="imagenes/montañaRusa.jpg">
                <img class="atraccion5" src="imagenes/ruedaDeLaFortuna.jpg">
        </section>
        

        
        <h2 class="subtitulo">Entradas y Pases</h2>
        <section class="contenedorEntradas" id="contenedorEntradas">
            
        </section>

        <h2 class="subtitulo">Medios de pago disponibles</h2>

        <section class="contenedorPagos">
            <article class="metodo">
                <p class="metodoNombre">Mercado Pago</p>
                <div class="logosContenedor">
                    <img src="imagenes/mercadoPago.svg" alt="Mercado Pago" class="img-pago">
                </div>
            </article>

            <article class="metodo">
                <p class="metodoNombre">Tarjeta de Crédito</p>
                <div class="logosContenedor">
                    <img src="imagenes/americanExpressCredito.svg" alt="American Express" class="img-pago">
                    <img src="imagenes/visaCredito.svg" alt="Visa Crédito" class="img-pago">
                    <img src="imagenes/mastercardCredito.svg" alt="Mastercard Crédito" class="img-pago">
                </div>
            </article>

            <article class="metodo">
                <p class="metodoNombre">Tarjeta de Débito</p>
                <div class="logosContenedor">
                    <img src="imagenes/masterCardDebito.svg" alt="Mastercard Débito" class="img-pago">
                    <img src="imagenes/visaDebito.svg" alt="Visa Débito" class="img-pago">
                </div>
            </article>

            <article class="metodo">
                <p class="metodoNombre">Efectivo</p>
                <div class="logosContenedor">
                    <img src="imagenes/pagoFacil.svg" alt="Pago Fácil" class="img-pago">
                    <img src="imagenes/rapipago.svg" alt="Rapipago" class="img-pago">
                </div>
            </article>
        </section>

    </main>
    <footer>
        <section class="logo">
            <a  href="main.html"><img src="imagenes/UNLaM-Land.PNG"></a>
        </section>
        <section class="redesSociales">
            <img class="logoRRSS" src="imagenes/whatsapp.svg">
            <img class="logoRRSS" src="imagenes/tiktok.svg">
            <img class="logoRRSS" src="imagenes/facebook.svg">
            <img class="logoRRSS"src="imagenes/instagram.svg">
        </section>
        <section class="contacto">
        <a class="contacto" href="contacto.html">Contacto</a>
        </section>
    </footer>  
    <script src="scripts/main.js"></script>
</body>
</html>
